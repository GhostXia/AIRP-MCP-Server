name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Build the lib + bin (confirms the whole crate compiles).
      - name: cargo build
        run: cargo build --verbose
      # Full test suite — integration_test.rs is now fixed (crate:: paths +
      # the PNG zTXt/base64 helper), so all targets run.
      - name: cargo test
        run: cargo test --verbose
